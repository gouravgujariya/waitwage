name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into HTML
        env:
          # SUPABASE_URL secret must be the actual project URL, e.g.:
          #   https://akjeoypmqqahdrevzajq.supabase.co
          # NOT a JWT token. Set this in GitHub → Settings → Secrets and variables → Actions.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          sed -i "s|__SUPABASE_URL__|$SUPABASE_URL|g" docs/index.html
          sed -i "s|__SUPABASE_ANON_KEY__|$SUPABASE_ANON_KEY|g" docs/index.html
          cp landing/index.html docs/landing.html
          sed -i "s|__SUPABASE_URL__|$SUPABASE_URL|g" docs/landing.html
          sed -i "s|__SUPABASE_ANON_KEY__|$SUPABASE_ANON_KEY|g" docs/landing.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
