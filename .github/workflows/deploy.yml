name: Sync landing → docs (GitHub Pages)

on:
  push:
    branches: [main, master]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Copy landing/ into docs/
        run: |
          rm -rf docs
          cp -r landing docs

      - name: Commit docs if changed
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add docs/
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: sync docs from landing [skip ci]" &&
            git push
          )
