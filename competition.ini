What Competitors Do Well

WaitWage.com

- Multi-page structure: /earnings, /how-it-works, /advertisers, /trust — each page does one job
- Live urgency counter: "45,000,000 minutes waited this year" updates in real-time — psychological hook
- Interactive earnings simulator: drag a slider (1–10h/day) → see monthly payout instantly. This is their #1 conversion tool
- User personas: "Dabbler / Steady builder / Lives in the editor" — users self-identify, feels personal
- Revenue split visual: single graphic, "You 70% / Platform 30%" — no ambiguity
- Early adopter mechanic: "$5 bonus across 5 payouts" — creates commitment and retention

Kickbacks.ai

- Before/After product demo: "Stock Claude Code" vs "With Kickbacks" side by side — shows exactly what changes
- Copy-paste install block on the hero — lowest friction possible CTA
- Self-serve advertiser portal: bid queue, real-time pricing chart, character-counted ad copy — makes it feel production-ready
- Market data: live impression rates, CPM charts — builds trust with advertisers

