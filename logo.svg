<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#79c0ff"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#388bfd;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Border glow -->
  <rect width="128" height="128" rx="22" fill="none" stroke="#21262d" stroke-width="1.5"/>

  <!-- Blue top accent bar -->
  <rect x="0" y="0" width="128" height="4" rx="2" fill="url(#blue)" opacity="0.9"/>

  <!-- Letter D -->
  <text x="18" y="88"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="900"
    fill="white"
    letter-spacing="-4"
    filter="url(#glow)">D</text>

  <!-- Letter C in blue -->
  <text x="62" y="88"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="900"
    fill="url(#blue)"
    letter-spacing="-4"
    filter="url(#glow)">C</text>

  <!-- Diagonal cut slash between letters -->
  <line x1="60" y1="16" x2="52" y2="98"
    stroke="url(#slash)"
    stroke-width="3.5"
    stroke-linecap="round"
    opacity="0.85"/>

  <!-- Bottom status bar hint -->
  <rect x="16" y="103" width="96" height="6" rx="3" fill="#21262d"/>
  <rect x="16" y="103" width="40" height="6" rx="3" fill="url(#blue)" opacity="0.7"/>

</svg>
